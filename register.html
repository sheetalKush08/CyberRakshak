<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CyberRakshak</title>
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
 <style>

/* Register Page */

body{
    min-height:100vh;
    background:#0F172A;
}

/* Register Container */

.form-container{
    height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Register Box */

.form-box{
    width:450px;
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,212,255,0.3);
}

/* Heading */

.form-box h2{
    color:#00D4FF;
    text-align:center;
    margin-bottom:30px;
}

/* Inputs */

.form-box input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#1E293B;
    color:white;
}

/* Button */

.form-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#00D4FF;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.form-box button:hover{
    background:#38BDF8;
    transform:translateY(-2px);
}

/* Bottom Text */

.form-box p{
    text-align:center;
    margin-top:20px;
    color:white;
}

.form-box a{
    color:#00D4FF;
    text-decoration:none;
}

.form-box a:hover{
    text-decoration:underline;
}

/* Mobile */

@media(max-width:768px){

    .form-box{
        width:95%;
        padding:30px;
    }

}

</style>
</head>
<body>
  <nav class="navbar">

    <div class="logo">
        <img src="assets/cybericon.png" alt="CyberRakshak">
    <span>CyberRakshak</span>
    </div>

    <ul class="nav-links">

        <li><a href="index.html">Home</a></li>

        <li><a href="login.html">Login</a></li>

        <li><a href="admin-login.php">Admin</a></li>

    </ul>

</nav>

<div class="form-container">

  <form action="php/register.php" method="POST" class="form-box">

    <h2>Create Account</h2>

    <input type="text" name="fullname" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Register</button>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </form>

</div>

</body>
</html>
