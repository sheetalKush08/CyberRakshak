<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - CyberRakshak</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">

<style>

body{
    min-height:100vh;
    background:#0F172A;
    padding-top:0;
}


.form-container{
    height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.form-box{
    width:400px;
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,212,255,0.3);
}

.form-box h2{
    color:#00D4FF;
    text-align:center;
    margin-bottom:30px;
}

.form-box input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border:none;
    border-radius:8px;
    background:#1E293B;
    color:white;
}

.form-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#00D4FF;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.form-box button:hover{
    background:#38BDF8;
}

.form-box p{
    text-align:center;
    margin-top:20px;
    color:white;
}

.form-box a{
    color:#00D4FF;
    text-decoration:none;
}

.form-box a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>


<nav class="navbar">

    <div class="logo">
        <img src="cybericon.png" alt="CyberRakshak">
    <span>CyberRakshak</span>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#awareness">Awareness</a></li>
        <li><a href="report.php">Report Crime</a></li>
        <li><a href="track.php">Track Complaint</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="index.html#footer">Contact</a></li>
    </ul>

</nav>


<div class="form-container">

    <form action="login.php" method="POST" class="form-box">

        <h2>Login</h2>

        <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

    </form>

</div>

</body>
</html>
